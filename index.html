<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ANZ PODATKi – Formularz kontaktowy</title>

  <!-- EmailJS SDK v4 -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f2f2f2;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
      max-width: 500px;
      width: 100%;
    }

    h1, h2, p {
      text-align: center;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    label {
      margin-top: 10px;
    }

    input, textarea, button {
      margin-top: 5px;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      margin-top: 20px;
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }

    #confirmation {
      margin-top: 15px;
      text-align: center;
      color: green;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ANZ PODATKi</h1>
    <p>ul. Świętokrzyska 18, 00-052 Warszawa</p>
    <p><a href="https://www.anzpodatki.com" target="_blank">www.anzpodatki.com</a></p>
    <h2>Formularz kontaktowy</h2>
    
    <form id="contactForm">
      <label for="name">Imię i nazwisko:</label>
      <input type="text" id="name" name="name" required>
      
      <label for="email">E-mail:</label>
      <input type="email" id="email" name="email" required>
      
      <label for="subject">Temat:</label>
      <input type="text" id="subject" name="subject" required>
      
      <label for="message">Wiadomość:</label>
      <textarea id="message" name="message" rows="5" required></textarea>
      
      <button type="submit">Wyślij</button>
    </form>

    <p id="confirmation"></p>
  </div>

  <script>
    const form = document.getElementById('contactForm');
    const confirmation = document.getElementById('confirmation');

    form.addEventListener('submit', async function (e) {
      e.preventDefault();

      const data = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        subject: document.getElementById('subject').value,
        message: document.getElementById('message').value
      };

      try {
        // 1. Wyślij dane do Azure Function
        await fetch('https://anzformularzappmanual.azurewebsites.net/api/submitForm?code=U7-GWqbfsQEOdzBw4AxeWWhxZe_1ghWB-P4-KGyRbGSOAzFuHSCr_w==', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        // 2. Inicjalizacja EmailJS
        emailjs.init("VFlTg8z-1RIfLjz-R");

        // 3. Wysyłka wiadomości
        await emailjs.send("service_om6pfoz", "template_knk9bj9", {
          from_name: data.name,
          from_email: data.email,
          subject: data.subject,
          message: data.message
        });

        confirmation.textContent = "Wiadomość została wysłana.";
        form.reset();
      } catch (error) {
        console.error("Błąd:", error);
        confirmation.textContent = "Wystąpił problem z wysyłką.";
      }
    });
  </script>
</body>
</html>
