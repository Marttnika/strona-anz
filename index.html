<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ANZ PODATKi – Formularz kontaktowy</title>
</head>
<body>
  <h1>ANZ PODATKi</h1>
  <p>ul. Świętokrzyska 18, 00-052 Warszawa</p>
  <p><a href="https://www.anzpodatki.com" target="_blank">www.anzpodatki.com</a></p>
  <h2>Formularz kontaktowy</h2>
  
  <form id="contactForm">
    <label for="name">Imię i nazwisko:</label><br/>
    <input type="text" id="name" name="name" required><br/><br/>
    
    <label for="email">E-mail:</label><br/>
    <input type="email" id="email" name="email" required><br/><br/>
    
    <label for="subject">Temat:</label><br/>
    <input type="text" id="subject" name="subject" required><br/><br/>
    
    <label for="message">Wiadomość:</label><br/>
    <textarea id="message" name="message" rows="5" required></textarea><br/><br/>
    
    <button type="submit">Wyślij</button>
  </form>

  <p id="confirmation" style="color: green;"></p>

  <script>
    // Tymczasowy handler formularza – nie wysyła jeszcze danych, tylko pokazuje komunikat
    document.getElementById('contactForm').addEventListener('submit', function (e) {
      e.preventDefault();
      document.getElementById('confirmation').textContent = "Wiadomość została wysłana.";
    });
  </script>
</body>
</html>
